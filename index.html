<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Sheet Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .container { max-width: 900px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .table-responsive { margin-top: 20px; }
        .btn-group-actions { margin-top: 15px; display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="mb-4">Serial Data Entry</h2>
    
    <!-- Input Section -->
    <div class="row g-3">
        <div class="col-md-9">
            <label for="dataInput" class="form-label">Type data (comma separated):</label>
            <input type="text" id="dataInput" class="form-control" placeholder="e.g. asf, ash, jjgg">
            <small class="text-muted">Example: inputting "apple, orange" creates columns for those items.</small>
        </div>
        <div class="col-md-3 d-flex align-items-end">
            <button onclick="addData()" class="btn btn-primary w-100">Submit</button>
        </div>
    </div>

    <hr>

    <!-- Display Section -->
    <h4>Data Sheet</h4>
    <div class="table-responsive">
        <table class="table table-bordered table-striped" id="dataSheet">
            <thead class="table-dark" id="tableHead">
                <tr>
                    <th>Serial Number</th>
                    <th>Data 1</th>
                    <th>Data 2</th>
                    <th>Data 3</th>
                    <th>Data 4</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Data will appear here -->
            </tbody>
        </table>
    </div>

    <!-- Actions -->
    <div class="btn-group-actions">
        <button onclick="downloadExcel()" class="btn btn-success">Download Excel</button>
        <button onclick="downloadPDF()" class="btn btn-danger">Download PDF</button>
        <button onclick="clearData()" class="btn btn-outline-secondary">Clear All Data</button>
    </div>
</div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<script>
    // 1. JS Logic starts here
</script>
</body>
</html>
